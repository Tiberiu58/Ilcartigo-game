# fly.toml app configuration file generated for ilcartigo-game on 2026-06-21T18:22:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ilcartigo-game'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
